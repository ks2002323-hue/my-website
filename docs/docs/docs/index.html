<!DOCTYPE html>
<html>

<head>
<title>Krish Tech Website</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background-color:#f5f5f5;
}

header{
background:#222;
color:white;
text-align:center;
padding:15px;
}

nav{
background:#333;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-size:18px;
}

.hero{
background:linear-gradient(to right, blue, purple);
color:white;
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:40px;
}

.hero button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
background:white;
cursor:pointer;
}

.features{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.feature-box{
background:white;
width:250px;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
}

/* Responsive design for phones */

@media (max-width: 600px){

.hero h1{
font-size:28px;
}

.features{
flex-direction:column;
align-items:center;
}

.feature-box{
width:80%;
}

}

</style>

</head>

<body>

<header>
<h2>Krish Tech</h2>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h1>Welcome to My Website</h1>
<p>I am learning Web Development</p>
<button onclick="hello()">Start</button>
</section>

<section class="features">

<div class="feature-box">
<h3>Web Development</h3>
<p>I build websites.</p>
</div>

<div class="feature-box">
<h3>Technology</h3>
<p>I love computers.</p>
</div>

<div class="feature-box">
<h3>My Goal</h3>
<p>I want to become a developer.</p>
</div>

</section>

<footer>
<p>© 2026 Krish Website</p>
</footer>

<script>

function hello(){
alert("Welcome to my responsive website!");
}

</script>

</body>


</html>
